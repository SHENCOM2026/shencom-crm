services:
  - type: web
    name: shencom-crm
    runtime: docker
    plan: starter
    region: oregon
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: DB_PATH
        value: /data/shencom.db
      - key: CRM_BASE_URL
        value: https://shencom-crm.onrender.com
      - key: GOOGLE_SHEET_ID
        value: 184HUCx8B9kpDwHKA-YUZUetfSIoYYzULGqjHpt04htM
      - key: GOOGLE_CREDENTIALS_JSON
        sync: false
    disk:
      name: shencom-data
      mountPath: /data
      sizeGB: 1
